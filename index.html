<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>João Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    .container {
      text-align: center;
      padding: 100px 20px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      font-size: 18px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #5865F2;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      display: inline-block;
      transition: 0.3s;
    }

    .btn:hover {
      background: #4752c4;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      background: #111;
      padding: 20px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>👑 João Dev</h1>
    <p>Discord Staff • Moderador • Programador</p>
    <a href="#" class="btn">Meu Discord</a>
  </div>

  <div class="section">
    <h2>Minhas Skills</h2>

    <div class="card">
      <h3>Moderação</h3>
      <p>Warn, mute, ban, organização</p>
    </div>

    <div class="card">
      <h3>Bots</h3>
      <p>Dyno, Sapphire, comandos</p>
    </div>

    <div class="card">
      <h3>Design</h3>
      <p>Carrd, layouts e estética</p>
    </div>
  </div>

</body>
</html>
